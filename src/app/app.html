<app-header/>

<main>
	<ul id="users">
		@for (user of users; track user.id) {
			<li>
				<app-user [user]="user" [selected]="user.id === selectedUserId" (selectedUser)="onSelectUser($event)"/>
			</li>
		}
	</ul>

	@if (selectedUser) {
		<app-tasks [userId]="selectedUser.id"></app-tasks>
	}
</main>
